name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.0.18)'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "28.2.13676358"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        bash compile-hevtun.sh
    
    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: AndroidLibXrayLite/go.sum

    - name: Build libv2ray
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init
        
        pushd AndroidLibXrayLite
        mkdir -p assets data
        # Download geo assets if needed
        bash gen_assets.sh download
        cp -v data/*.dat assets/
        go mod tidy
        gomobile bind -v -androidapi 24 -trimpath -ldflags='-s -w -buildid=' -o libv2ray.aar ./
        popd
        
        mkdir -p V2rayNG/app/libs/
        cp AndroidLibXrayLite/libv2ray.aar V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Extract version from tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          TAG_NAME="${{ github.ref_name }}"
          VERSION_NAME="${TAG_NAME#v}"
        elif [[ "${{ github.event.inputs.release_tag }}" != "" ]]; then
          TAG_NAME="${{ github.event.inputs.release_tag }}"
          VERSION_NAME="${TAG_NAME#v}"
        else
          VERSION_NAME="dev-$(git rev-parse --short HEAD)"
        fi
        
        IFS='.' read -ra VERSION_PARTS <<< "$VERSION_NAME"
        MAJOR=${VERSION_PARTS[0]:-0}
        MINOR=${VERSION_PARTS[1]:-0}
        PATCH=${VERSION_PARTS[2]:-0}
        VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
        
        # dev builds always produce 0, use commit count as fallback
        if [[ "$VERSION_CODE" -le 0 ]]; then
          VERSION_CODE=$(git rev-list --count HEAD 2>/dev/null || echo 717)
        fi
        
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "Version: $VERSION_NAME ($VERSION_CODE)"

    - name: Determine build type
      id: build_type
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "build_type=release" >> $GITHUB_OUTPUT
        else
          echo "build_type=debug" >> $GITHUB_OUTPUT
        fi

    - name: Set up keystore for release build
      if: steps.build_type.outputs.build_type == 'release'
      uses: timheuer/base64-to-file@v1.2.4
      id: android_keystore
      with:
        fileName: "android_keystore.jks"
        encodedString: ${{ secrets.APP_KEYSTORE_BASE64 }}

    - name: Build release APK
      if: steps.build_type.outputs.build_type == 'release'
      env:
        KEYSTORE_FILE: ${{ steps.android_keystore.outputs.filePath }}
        KEYSTORE_PASSWORD: ${{ secrets.APP_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.APP_KEYSTORE_ALIAS }}
        KEY_PASSWORD: ${{ secrets.APP_KEY_PASSWORD }}
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        if [ -f "${KEYSTORE_FILE}" ]; then
          echo "Keystore found, signing release build"
          ls -lh "${KEYSTORE_FILE}"
        else
          echo "No keystore secrets, using fallback release.keystore"
        fi
        chmod 755 gradlew
        ./gradlew assemblePlaystoreRelease assembleFdroidRelease 2>&1 | tail -30
    
    - name: Build debug APK
      if: steps.build_type.outputs.build_type == 'debug'
      shell: bash
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew assembleDebug 2>&1
    
    - name: Upload debug APKs
      if: steps.build_type.outputs.build_type == 'debug' && success()
      uses: actions/upload-artifact@v7
      with:
        name: AetrisVPN-debug
        path: |
          ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/**/*.apk

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v7
      if: steps.build_type.outputs.build_type == 'release' && success()
      with:
        name: arm64-v8a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v7
      if: steps.build_type.outputs.build_type == 'release' && success()
      with:
        name: armeabi-v7a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*armeabi-v7a*.apk

    - name: Upload x86 APK
      uses: actions/upload-artifact@v7
      if: steps.build_type.outputs.build_type == 'release' && success()
      with:
        name: x86-apk
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*x86*.apk

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      if: steps.build_type.outputs.build_type == 'release' && (github.event.inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/'))
      with:
        files: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*.apk
        tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
        prerelease: false
        generate_release_notes: true
